version: '3.8'

services:
  # MongoDB for Merchants
  mongodb:
    image: mongo:latest
    container_name: ecommerce_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: mongopass
      MONGO_INITDB_DATABASE: ecommerce_merchants
    volumes:
      - mongodb_data:/data/db
      - ./database/schemas:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network

  # PostgreSQL for Shoppers, Delivery, Admin, Shared
  postgresql:
    image: postgres:15-alpine
    container_name: ecommerce_postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_shoppers
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and real-time delivery tracking
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    ports:
      - "5000:5000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongouser:mongopass@mongodb:27017/ecommerce_merchants
      PG_HOST: postgresql
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: dev_access_secret_key
      JWT_REFRESH_SECRET: dev_refresh_secret_key
    volumes:
      - ./backend/src:/app/src
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend - Merchant Portal
  merchant_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.merchant
    container_name: ecommerce_merchant_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://backend:5000
    networks:
      - ecommerce_network

  # Frontend - Shopper Portal
  shopper_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.shopper
    container_name: ecommerce_shopper_frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://backend:5000
    networks:
      - ecommerce_network

  # Frontend - Delivery Portal
  delivery_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.delivery
    container_name: ecommerce_delivery_frontend
    ports:
      - "3003:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://backend:5000
    networks:
      - ecommerce_network

  # Frontend - Admin Portal
  admin_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    container_name: ecommerce_admin_frontend
    ports:
      - "3004:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://backend:5000
    networks:
      - ecommerce_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - merchant_frontend
      - shopper_frontend
      - delivery_frontend
      - admin_frontend
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  mongodb_data:
  postgresql_data:
  redis_data:
